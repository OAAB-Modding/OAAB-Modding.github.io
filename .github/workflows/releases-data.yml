# Regenerates releases-data.js from OAAB-Modding/Data Discussions.
name: Sync release discussions

on:
  repository_dispatch:
    types: [sync-releases]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-release-discussions
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate releases data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-releases-data.mjs

      - name: Validate release image URLs
        run: node scripts/validate-releases-data.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain releases-data.js)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add releases-data.js
            git commit -m "chore: sync release discussions"
            git push
          else
            echo "No release discussion changes."
          fi
